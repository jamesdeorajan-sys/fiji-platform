<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drive for Nadi Airport Transfers</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root { --ocean: #0d4d6e; --paper: #faf6f0; --ink: #1a1a1a; --line: #d8d0c2; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--paper); color: var(--ink); margin: 0; padding: 24px 16px 80px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 28px; }
  form { display: flex; flex-direction: column; gap: 18px; }
  label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 6px; }
  input[type=text], input[type=tel], select { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 15px; background: #fff; }
  select[multiple] { min-height: 160px; }
  .hint { font-size: 12px; color: #888; margin-top: 4px; }
  .file-row { border: 1px dashed var(--line); border-radius: 8px; padding: 14px; background: #fffdf8; }
  input[type=file] { width: 100%; }
  button { background: var(--ocean); color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
  #result.ok { display: block; background: #e5f5ea; border: 1px solid #8fce9f; }
  #result.err { display: block; background: #fdeaea; border: 1px solid #e8a0a0; }
  .errlist { margin: 6px 0 0; padding-left: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Drive for Nadi Airport Transfers</h1>
  <p class="sub">Fill in your details below. Our team reviews every application before approval — you'll get a WhatsApp message once you're verified.</p>

  <form id="joinForm">
    <div>
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div>
      <label for="phone">WhatsApp phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="+679 XXX XXXX" required>
      <div class="hint">Used for your approval notification and driver app login.</div>
    </div>

    <div>
      <label for="vehicle_type">Vehicle type</label>
      <select id="vehicle_type" name="vehicle_type" required>
        <option value="">Select...</option>
        <option value="sedan">Sedan</option>
        <option value="minivan">Minivan</option>
        <option value="minibus">Minibus</option>
      </select>
    </div>

    <div>
      <label for="plate">Vehicle registration plate</label>
      <input type="text" id="plate" name="plate" required>
    </div>

    <div>
      <label for="zones">Zones you can service (select all that apply)</label>
      <select id="zones" name="zones" multiple required></select>
      <div class="hint">Hold Ctrl (Windows) or Cmd (Mac) to select more than one.</div>
    </div>

    <div class="file-row">
      <label for="vehicle_photo">Vehicle photo</label>
      <input type="file" id="vehicle_photo" name="vehicle_photo" accept="image/jpeg,image/png,image/webp" required>
    </div>

    <div class="file-row">
      <label for="license_photo">Driver's license photo</label>
      <input type="file" id="license_photo" name="license_photo" accept="image/jpeg,image/png,image/webp" required>
    </div>

    <div class="file-row">
      <label for="insurance_photo">Vehicle insurance photo</label>
      <input type="file" id="insurance_photo" name="insurance_photo" accept="image/jpeg,image/png,image/webp" required>
    </div>

    <button type="submit" id="submitBtn">Submit application</button>
  </form>

  <div id="result"></div>
</div>

<script>
  const API_URL = 'https://nadi-dispatch-api.helpronline.workers.dev';

  async function loadZones() {
    const sel = document.getElementById('zones');
    try {
      const res = await fetch(API_URL + '/zones');
      const data = await res.json();
      (data.zones || []).forEach(z => {
        const opt = document.createElement('option');
        opt.value = z.name;
        opt.textContent = z.name;
        sel.appendChild(opt);
      });
    } catch (e) {
      sel.innerHTML = '<option value="">Could not load zones — please refresh</option>';
    }
  }
  loadZones();

  const form = document.getElementById('joinForm');
  const resultEl = document.getElementById('result');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    resultEl.className = '';
    resultEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    const fd = new FormData(form);

    try {
      const res = await fetch(API_URL + '/drivers', { method: 'POST', body: fd });
      const data = await res.json();

      if (res.ok && data.ok) {
        resultEl.className = 'ok';
        resultEl.innerHTML = '<strong>Application submitted!</strong> We\'ll review your documents and send a WhatsApp message once approved.';
        form.reset();
      } else {
        resultEl.className = 'err';
        const errs = data.errors ? '<ul class="errlist">' + data.errors.map(x => '<li>' + x + '</li>').join('') + '</ul>' : (data.error || 'Submission failed.');
        resultEl.innerHTML = '<strong>Could not submit:</strong>' + errs;
      }
    } catch (err) {
      resultEl.className = 'err';
      resultEl.innerHTML = '<strong>Connection error.</strong> Please try again.';
    } finally {
      resultEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit application';
    }
  });
</script>
</body>
</html>
